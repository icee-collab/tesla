<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Speak | Your Voice. Our Mission.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --tesla-red: #E82127;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: white;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 1.4rem;
            color: #ddd;
            font-weight: 500;
        }

        .showcase {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 20px;
            background: #111;
        }

        .showcase img {
            width: 280px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s;
        }

        .showcase img:hover {
            transform: scale(1.05);
        }

        .feedback-section {
            padding: 60px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            color: white;
        }

        .feedback form {
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 800px;
            margin: auto;
            background: #111;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .feedback input,
        .feedback select,
        .feedback textarea {
            padding: 16px 18px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: #222;
            color: white;
        }

        .feedback input:focus,
        .feedback select:focus,
        .feedback textarea:focus {
            outline: 2px solid var(--tesla-red);
        }

        .feedback button {
            background: var(--tesla-red);
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .feedback button:hover {
            background: #c0171d;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2.8rem;
            }
            .showcase img {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">TESLA SPEAK</div>
        <p class="tagline">Your Voice. Our Mission.</p>
    </header>

    <div class="showcase">
        <img src="https://picsum.photos/id/1015/1200/800" alt="Tesla Model S">
        <img src="https://picsum.photos/id/201/1200/800" alt="Tesla Model 3">
        <img src="https://picsum.photos/id/870/1200/800" alt="Tesla Model X">
        <img src="https://picsum.photos/id/106/1200/800" alt="Tesla Cybertruck">
    </div>

    <section id="feedback" class="feedback-section">
        <h2 class="section-title">Submit Feedback</h2>
        
        <div class="feedback">
            <form action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST">
                <input type="text" name="fullname" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="tel" name="phone" placeholder="Phone Number" required>
                <input type="text" name="country" placeholder="Country" required>

                <select name="tesla_model" required>
                    <option value="">Select Tesla Model</option>
                    <option>Model S</option>
                    <option>Model 3</option>
                    <option>Model X</option>
                    <option>Model Y</option>
                    <option>Cybertruck</option>
                    <option>Roadster</option>
                    <option>Other</option>
                </select>

                <input type="text" name="subject" placeholder="Subject" required>
                <textarea name="message" placeholder="Enter your feedback..." rows="7" required></textarea>

                <button type="submit">Submit Feedback</button>

                <input type="hidden" name="_subject" value="New Tesla Speak Feedback!">
                <input type="hidden" name="_captcha" value="false">
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Tesla Speak. All rights reserved.</p>
        <p>Made for Tesla owners who want to be heard.</p>
    </footer>
</body>
</html>
